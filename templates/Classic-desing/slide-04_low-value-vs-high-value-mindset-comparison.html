<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 4</title>
<style>
  {{{css}}}
  body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    {{#if backgroundImage}}
    background-image: linear-gradient(rgba(10, 10, 10, 0.85), rgba(10, 10, 10, 0.85)), url('{{backgroundImage}}');
    background-size: cover;
    background-position: center;
    {{/if}}
  }
  .col {
    padding: 68px 52px;
    display: flex;
    flex-direction: column;
  }
  .col-left { background: rgba(10, 10, 10, 0.95); }
  .col-right { background: rgba(17, 17, 17, 0.95); }
  .col-title {
    font-size: 96px;
    font-weight: 900;
    text-transform: uppercase;
    line-height: 0.88;
    letter-spacing: -0.01em;
    margin-bottom: 28px;
    white-space: pre-wrap;
  }
  .col-left .col-title { color: #555555; }
  .col-right .col-title { color: var(--white); }
  .col-title .arrow {
    color: var(--orange);
    font-size: 80px;
    display: inline-block;
    transform: rotate(-45deg) translateY(-8px);
    margin-left: 8px;
  }
  .divider-h {
    height: 2px;
    background: #333;
    width: 100%;
    margin-bottom: 36px;
  }
  .col-right .divider-h { background: var(--orange); }
  .item-row {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 28px;
  }
  .icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2.5px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    font-weight: 700;
  }
  .col-left .icon { border-color: #555; color: #555; }
  .col-right .icon { border-color: var(--orange); color: var(--orange); }
  .item-text {
    font-family: var(--font-body);
    font-size: 24px;
    font-weight: 400;
  }
  .col-left .item-text { color: #666666; }
  .col-right .item-text { color: var(--white); }
  .cta-btn {
    margin-top: auto;
    border: 2px solid;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .col-left .cta-btn { border-color: #555; color: #555; }
  .col-right .cta-btn { border-color: var(--orange); color: var(--white); background: transparent; }
  .btn-icon-orange {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--orange);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--white);
    font-size: 16px;
    font-weight: 900;
    transform: rotate(-45deg);
    flex-shrink: 0;
  }
  .btn-icon-gray {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid #555;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
    font-size: 18px;
    flex-shrink: 0;
  }
</style>
</head>
<body>
  <div class="col col-left">
    <div class="col-title">{{leftColumn.title}}</div>
    <div class="divider-h"></div>
    {{#each leftColumn.items}}
    <div class="item-row"><div class="icon">✕</div><div class="item-text">{{this}}</div></div>
    {{/each}}
    <div class="cta-btn"><div class="btn-icon-gray">−</div> {{leftColumn.cta}}</div>
  </div>
  <div class="col col-right">
    <div class="col-title">{{rightColumn.title}} <span class="arrow">↗</span></div>
    <div class="divider-h"></div>
    {{#each rightColumn.items}}
    <div class="item-row"><div class="icon">✓</div><div class="item-text">{{this}}</div></div>
    {{/each}}
    <div class="cta-btn"><div class="btn-icon-orange">↗</div> {{rightColumn.cta}}</div>
  </div>
</body>
</html>
