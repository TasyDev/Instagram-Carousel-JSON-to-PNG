<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 3</title>
<style>
  {{{css}}}
  body {
    padding: 80px 72px;
    justify-content: flex-start;
    {{#if backgroundImage}}
    background-image: linear-gradient(rgba(10, 10, 10, 0.85), rgba(10, 10, 10, 0.85)), url('{{backgroundImage}}');
    background-size: cover;
    background-position: center;
    {{/if}}
  }
  .big-num {
    font-size: 380px;
    font-weight: 900;
    color: var(--orange);
    line-height: 0.85;
    text-transform: uppercase;
    letter-spacing: -0.03em;
    margin-top: 20px;
  }
  .subtitle {
    font-size: 100px;
    font-weight: 900;
    color: var(--white);
    text-transform: uppercase;
    line-height: 0.92;
    letter-spacing: -0.01em;
    margin-top: 10px;
    white-space: pre-wrap;
  }
  .divider {
    width: 100%;
    height: 3px;
    background: var(--orange);
    margin-top: 54px;
    margin-bottom: 44px;
  }
  .body-text {
    font-family: var(--font-body);
    font-size: 28px;
    font-weight: 400;
    color: #cccccc;
    line-height: 1.6;
    max-width: 820px;
    white-space: pre-wrap;
  }
</style>
</head>
<body>
  <div class="big-num">{{bigNumber}}</div>
  <div class="subtitle">{{subtitle}}</div>
  <div class="divider"></div>
  <div class="body-text">{{body}}</div>
</body>
</html>
